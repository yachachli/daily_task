name: Generate WC Deep Analysis

on:
  schedule:
    # 11:30 UTC — after the wc2026-predictor refresh (10:00 UTC) writes predictions
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  generate-wc-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Generate WC deep analysis to Neon
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          # Optional override; defaults to the deployed function in the script.
          WC_ANALYSIS_API_URL: ${{ vars.WC_ANALYSIS_API_URL }}
        run: uv run -m daily_bets.scripts.generate_wc_analysis
