name: Daily CBB Games Predictions

on:
  schedule:
    # 2:00 AM Pacific Daylight Time on March 20, 2026 / 09:00 UTC.
    # GitHub Actions cron runs in UTC, so this will run at 1:00 AM Pacific Standard Time in winter.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  sync-daily-cbb-games:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Sync Daily CBB Games to Neon
        env:
          CBB_GAME_PREDICTOR_URL: ${{ secrets.CBB_GAME_PREDICTOR_URL }}
          CBB_GAME_PREDICTOR_BEARER_TOKEN: ${{ secrets.CBB_GAME_PREDICTOR_BEARER_TOKEN }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: uv run -m daily_bets.scripts.sync_daily_cbb_games
