version: "2"
plugins:
  - name: python
    wasm:
      url: https://github.com/rayakame/sqlc-gen-better-python/releases/download/v0.4.5/sqlc-gen-better-python.wasm
      sha256: 9b42f7cffda942388470e777af957ec8ab03cbea9124ff8c49bef05f9d00cb66
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "schema.sql"
    codegen:
      - out: "daily_bets/db"
        plugin: python
        options:
          package: "daily_bets.db"
          emit_init_file: true
          sql_driver: "asyncpg"
          model_type: "msgspec"
          rename:
            "off_efg%": "off_efg_pct"
            "off_to%": "off_to_pct"
            "off_or%": "off_or_pct"
            "def_efg%": "def_efg_pct"
            "def_to%": "def_to_pct"
            "def_or%": "def_or_pct"
            "3p%": "three_p_pct"
            "2p%": "two_p_pct"
            "ft%": "ft_pct"
            "blk%": "blk_pct"
            "stl%": "stl_pct"
            "nst%": "nst_pct"
            "a%": "a_pct"
            "3pa%": "three_pa_pct"
            "new notes": "new_notes"
